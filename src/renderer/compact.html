<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline';" />
  <title>ZipMover</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="compact.css" />
</head>
<body class="compact-body">
  <div id="compactApp">
    <!-- Titlebar / drag handle -->
    <div class="compact-titlebar" id="compactTitlebar">
      <span class="compact-logo">⚡ ZipMover</span>
      <div class="compact-titlebar-actions">
        <button class="compact-btn-icon" id="btnExpandToFull" title="Open full view">⤢</button>
        <button class="compact-btn-icon compact-btn-close" id="btnCloseCompact" title="Close">✕</button>
      </div>
    </div>

    <!-- Drop zones grid -->
    <div id="compactZones" class="compact-zones"></div>

    <!-- Status bar -->
    <div class="compact-statusbar">
      <span id="compactStatus" class="compact-status-text">Watching…</span>
      <span class="compact-status-hint">Drop ZIP or file onto a project</span>
    </div>
  </div>

  <!-- Conflict resolution modal -->
  <div id="conflictModal" class="conflict-modal" style="display:none">
    <div class="conflict-modal-body">
      <div class="conflict-title">⚠ Multiple Matches</div>
      <div class="conflict-msg" id="conflictMsg"></div>
      <div id="conflictButtons" class="conflict-buttons"></div>
      <button class="compact-btn-cancel" id="btnConflictCancel">Cancel</button>
    </div>
  </div>

  <script src="compact.js"></script>
</body>
</html>
